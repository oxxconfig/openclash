;2、策略组
custom_proxy_group=🔃应用更新`select`[]REJECT`[]其它-手动`[]手动切换`[]DIRECT
custom_proxy_group=🔴定位追踪`select`[]日本-自动`[]新加坡-自动`[]香港-自动`[]台湾-自动`[]韩国-自动`[]美国-自动`[]其它-手动`[]手动切换`[]DIRECT`[]REJECT
