custom_proxy_group=🔐海外开户`select`[]手动切换`[]其它-手动`[]DIRECT`[]REJECT

; ===== 1. 定义中转组 (第一层) =====
custom_proxy_group=机场-中转`url-test`^(?!.*海外).*(广港|香港|HK|广台|台湾|TW|广日|日本|JP|广新|新加坡|SG)`http://www.gstatic.com/generate_204`180,5,30

; ===== 2. 定义落地组 (第二层，临时用美国节点测试) =====
; 注意：这里我们先用 select 模式，手动选一个美国节点
custom_proxy_group=自建-落地`select`^(?!.*海外).*(广美|美国|US|🇺🇸)

; ===== 3. 建立链式关联 (Relay 的替代者) =====
; 如果你的后端转换器版本较老，不支持自动转换 dialer-proxy
; 我们直接把“自建-落地链”指向“自建-落地”，但手动给它挂载拨号代理
custom_proxy_group=自建-落地链`select`[]自建-落地`dialer-proxy=机场-中转

custom_proxy_group=🤖ChatGPT`select`[]自建-落地链`[]新加坡-自动`[]日本-自动`[]美国-自动`[]韩国-自动`[]台湾-自动`[]其它-手动`[]手动切换`[]DIRECT`[]REJECT
