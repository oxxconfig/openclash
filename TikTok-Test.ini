custom_proxy_group=其它-手动`select`(?i)^((?!(USA|🇺🇸|United States|Japan|🇯🇵|日本|东京|Hong Kong|🇭🇰|香港|Singapore|🇸🇬|新加坡|Taiwan|🇹🇼|🇨🇳|台灣|台湾|Russia|RU|俄罗斯|俄|GB|\.00|流量|有效期|官方|Traffic|Validity|Official|Reset|Date|网址|Mix|海外|剩余|到期|续费|地址)).)*$

