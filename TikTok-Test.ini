;2、策略组
custom_proxy_group=🔃应用更新`select`[]REJECT`[]其它-手动`[]手动切换`[]DIRECT
custom_proxy_group=🔴定位追踪`select`[]日本-自动`[]新加坡-自动`[]香港-自动`[]台湾-自动`[]韩国-自动`[]美国-自动`[]其它-手动`[]手动切换`[]DIRECT`[]REJECT
custom_proxy_group=🔗本地直连`select`[]DIRECT`[]其它-手动`[]手动切换`[]REJECT
custom_proxy_group=🔐海外开户`select`[]手动切换`[]其它-手动`[]DIRECT`[]REJECT

; 1️⃣ 中转组（第一跳）
custom_proxy_group=中转`select`^(?!.*(GB|\.00|流量|有效期|官方|Traffic|Validity|Official|Reset|Date|网址|Mix|海外|剩余|到期|续费|地址)).*$

; 2️⃣ 落地物理节点（只锁定真实节点，不参与正则筛选）
; 用 url-test 而不是 select，避免某些转换器误优化
custom_proxy_group=落地`select`^🇺🇸 United States丨01$


; 3️⃣ 链式组（关键）
; 写法必须紧跟 []落地 再接 dialer-proxy
;custom_proxy_group=落地链`relay`[]中转`[]🇺🇸 United States丨01
custom_proxy_group=落地链`select`^🇺🇸 United States丨01$`dialer-proxy=中转

custom_proxy_group=🤖ChatGPT`select`[]落地链`[]新加坡-自动`[]日本-自动`[]美国-自动`[]韩国-自动`[]台湾-自动`[]其它-手动`[]手动切换`[]DIRECT`[]REJECT
